services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    ports:
      - "8000:8080"
    environment:
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      PHP_OPCACHE_ENABLE: "1"
      PHP_MEMORY_LIMIT: "512M"
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ecom-graph-db

  postgres:
    image: docker.io/postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ecom_graph_db
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d ecom_graph_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecom-graph-db

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-graph-db

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecom-graph-db

  typesense:
    image: typesense/typesense:latest
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-typesense-api-key}
    command: --data-dir /data
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecom-graph-db

  typesense-dashboard:
    image: bfritscher/typesense-dashboard
    ports:
      - "8109:80"
    networks:
      - ecom-graph-db

volumes:
  postgres_data:
  pgadmin_data:
  neo4j_data:
  typesense_data:

networks:
  ecom-graph-db:
    driver: bridge
